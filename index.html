<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>지선 공약 보험영업 타겟 — 영업담당자 대시보드</title>
<style>
:root{--g:#2E5443;--gold:#C2A878;--mid:#749E87;--blue:#51677B;--wash:#F2F6F3;--line:#E0E6E1;--mute:#6A726C;--dark:#24332C;--fest:#B9741F}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"맑은 고딕","Malgun Gothic",-apple-system,sans-serif;background:#F7F9F7;color:var(--dark);font-size:14px;line-height:1.5}
.tabs{display:flex;background:var(--g);position:sticky;top:0;z-index:20}
.tab{flex:1;text-align:center;color:#B7C9BE;padding:13px 4px;font-weight:800;font-size:14.5px;cursor:pointer;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom-color:var(--gold)}
.tab.fest.on{border-bottom-color:#E7B25A}
.bar{background:#fff;border-bottom:1px solid var(--line);padding:9px 0;position:sticky;top:49px;z-index:15}
.scroll{display:flex;gap:6px;overflow-x:auto;padding:0 14px 2px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{height:4px}.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.chip{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap}
.chip.on{background:var(--g);color:#fff;border-color:var(--g)}
.chip small{font-weight:400;opacity:.72;margin-left:3px}
.qwrap{padding:8px 14px 0}
#q{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px}
.meta{padding:9px 16px;font-size:12.5px;color:var(--mute)}
.wrap{padding:0 14px 46px}
.grp{margin-bottom:18px}
.grp h2{font-size:15px;color:var(--g);border-left:4px solid var(--gold);padding-left:9px;margin:14px 0 9px;display:flex;align-items:center;gap:8px}
.grp h2 .n{font-size:12px;color:#fff;background:var(--mid);border-radius:10px;padding:1px 9px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 14px}
.card.fc{border-left:4px solid var(--fest)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.rg{font-weight:800;font-size:15px;color:var(--g);cursor:pointer}
.card.fc .rg{color:var(--fest)}
.rg .ar{color:var(--mid);font-size:12px}
.nm{font-size:12px;color:var(--mute)}
.tag{display:inline-block;font-size:11px;font-weight:700;color:var(--mid);background:var(--wash);border-radius:5px;padding:1px 7px;margin-left:5px}
.fn{font-size:13.5px;font-weight:800;color:var(--fest);margin:6px 0 2px}
.sm{margin:7px 0;font-size:14px;color:var(--dark);font-weight:600;line-height:1.45}
.pd{display:inline-block;background:var(--wash);color:var(--g);border:1px solid #d8e4dc;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700}
.card.fc .pd{background:#F8F0E3;color:var(--fest);border-color:#e8d6bb}
.src{font-size:11px;color:#9aa29c;float:right;margin-top:4px}
.contact{font-size:12.5px;color:var(--mute);border-top:1px dashed var(--line);padding-top:8px;margin-top:8px}
.contact b{color:var(--dark)}
.orglink{display:inline-block;margin-top:5px;color:var(--blue);font-weight:700;text-decoration:none;font-size:12.5px}
.route{margin-top:9px;display:none;background:var(--wash);border-radius:9px;padding:10px}
.route.open{display:block}
.route .ofc{font-weight:800;color:var(--g);margin-bottom:8px;font-size:13.5px}
.route a{display:block;text-align:center;margin:6px 0;padding:11px;border-radius:9px;font-size:13.5px;font-weight:800;text-decoration:none}
.route .og{background:var(--g);color:#fff}.route .kk{background:#FEE500;color:#3c1e1e}.route .nv{background:#03C75A;color:#fff}
.route .note{color:var(--mute);margin-top:6px;font-size:11px;line-height:1.4}
.empty{color:var(--mute);padding:34px;text-align:center}
/* 홈 */
.home{padding:14px 0 40px}
.hkpi{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:6px}
.hk{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center}
.hk b{display:block;font-size:26px;font-weight:800;color:var(--g);line-height:1.1}
.hk.g b{color:var(--g)}.hk.b b{color:var(--blue)}.hk.o b{color:var(--gold)}.hk.f b{color:var(--fest)}
.hk small{font-size:11.5px;color:var(--mute);font-weight:700}
.hh{font-size:15px;color:var(--g);font-weight:800;border-left:4px solid var(--gold);padding-left:9px;margin:20px 0 10px}
.depgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:9px}
.depc{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;transition:.15s;border-left:4px solid var(--mid)}
.depc:hover{box-shadow:0 4px 14px rgba(46,84,67,.12);border-left-color:var(--g)}
.depc .dt{display:flex;justify-content:space-between;align-items:baseline}
.depc .bu{font-size:15px;font-weight:800;color:var(--g)}
.depc .cnt{font-size:14px;font-weight:800;color:var(--gold)}
.depc .who{font-size:12px;color:var(--mute);margin:1px 0 7px}
.depc .ths{display:flex;flex-wrap:wrap;gap:4px}
.depc .th{font-size:10.5px;background:var(--wash);color:var(--g);border:1px solid var(--line);border-radius:10px;padding:2px 7px}
.thbars{background:#fff;border:1px solid var(--line);border-radius:11px;padding:6px 14px}
.thb{display:flex;align-items:center;gap:10px;padding:5px 0;cursor:pointer;border-bottom:1px solid #f0f3f0}
.thb:last-child{border-bottom:0}.thb:hover .tn{color:var(--blue)}
.thb .tn{width:100px;font-size:12.5px;font-weight:700;color:var(--dark);flex:0 0 auto}
.thb .tc2{width:32px;text-align:right;font-size:12.5px;font-weight:800;color:var(--g);flex:0 0 auto}
.thb .bar{height:11px;border-radius:3px;background:var(--blue)}
.thb:first-child .bar{background:var(--mid)}
@media(max-width:640px){.hkpi{grid-template-columns:repeat(2,1fr)}}
@media(min-width:641px){.route a{display:inline-block;margin:3px 6px 3px 0;padding:8px 13px}}
</style></head><body>

function rDep(){
  const items=Object.keys(D.assign).map(bu=>({k:bu,info:D.assign[bu],n:D.rows.filter(r=>D.assign[bu].themes.includes(r.th)).length}));
  chips(items,it=>it.k+' <small>'+it.info.name.split(',')[0]+' '+it.n+'</small>');
  const dep=state.sel&&D.assign[state.sel];
  let rows=D.rows.filter(r=>!dep||dep.themes.includes(r.th));
  rows=q(rows,['rg','nm','sm','pd','dept']);
  document.getElementById('meta').innerHTML=(dep?'<b>'+state.sel+' '+D.assign[state.sel].name+'</b> 담당 · ':'전체 · ')+'<b>'+rows.length+'건</b>'+(dep?' · '+dep.themes.join(', '):'');
  groupCards(rows,'th');
}
function rTheme(){
  const cnt={};D.rows.forEach(r=>cnt[r.th]=(cnt[r.th]||0)+1);
  chips(Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]).map(t=>({k:t,n:cnt[t]})),it=>it.k+' <small>'+it.n+'</small>');
  let rows=q(D.rows.filter(r=>!state.sel||r.th===state.sel),['rg','nm','sm','pd']);
  document.getElementById('meta').innerHTML=(state.sel?'<b>'+state.sel+'</b> · ':'전체 · ')+'<b>'+rows.length+'건</b> (테마별)';
  groupCards(rows,'th');
}
function rFest(){
  let fs=q(D.fest,['rg','nm','fn','sm']);
  document.getElementById('meta').innerHTML='축제·행사 <b>'+fs.length+'건</b> · 매칭상품 <b>행사배상책임보험</b> · 담당자 배정 없음';
  const wrap=document.getElementById('wrap');
  if(!fs.length){wrap.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  const by={};fs.forEach(f=>{(by[f.sd]=by[f.sd]||[]).push(f);});
  wrap.innerHTML=D.sdo.filter(s=>by[s]).map(s=>'<div class="grp"><h2>'+esc(s)+'<span class="n">'+by[s].length+'</span></h2><div class="grid">'+by[s].map((f,i)=>festCard(f,'f'+s+i)).join('')+'</div></div>').join('');
}
const S=D.start;
const isMobile=/android|iphone|ipad|ipod/i.test(navigator.userAgent);
function kakaoRoute(o){ // 앱: 대중교통 경로 / 웹 폴백
  if(o.xy) return isMobile
    ? 'kakaomap://route?sp='+S.lat+','+S.lng+'&ep='+o.xy[0]+','+o.xy[1]+'&by=PUBLICTRANSIT'
    : 'https://map.kakao.com/?sName='+encodeURIComponent(S.name)+'&eName='+encodeURIComponent(o.ofc);
  return 'https://map.kakao.com/?sName='+encodeURIComponent(S.name)+'&eName='+encodeURIComponent(o.ofc);
}
function naverRoute(o){
  if(o.xy && isMobile) return 'nmap://route/public?slat='+S.lat+'&slng='+S.lng+'&sname='+encodeURIComponent(S.name)
    +'&dlat='+o.xy[0]+'&dlng='+o.xy[1]+'&dname='+encodeURIComponent(o.ofc)+'&appname=lead.dashboard';
  return 'https://map.naver.com/p/search/'+encodeURIComponent(o.ofc);
}
function go(url,web,ev){ // 앱 스킴 시도 후 실패 시 웹 폴백
  if(ev)ev.preventDefault();
  if(url.startsWith('http')){window.open(url,'_blank');return;}
  const t=Date.now();
  const timer=setTimeout(()=>{if(Date.now()-t<1600)window.open(web,'_blank');},1200);
  window.location.href=url;
  window.addEventListener('pagehide',()=>clearTimeout(timer),{once:true});
}
function orgBtns(o){
  const og=o.org?'<a class="og" href="'+esc(o.org)+'" target="_blank" rel="noopener">📋 '+esc(o.ofc)+' 조직도·직원안내</a>':'';
  const kk=kakaoRoute(o), kw='https://map.kakao.com/?sName='+encodeURIComponent(S.name)+'&eName='+encodeURIComponent(o.ofc);
  const nv=naverRoute(o), nw='https://map.naver.com/p/search/'+encodeURIComponent(o.ofc);
  return '<div class="ofc">🏛 '+esc(o.ofc)+(o.xy?'':' <span style="color:#c99;font-weight:400;font-size:11px">(좌표없음·검색)</span>')+'</div>'+og
    +'<a class="kk" href="'+esc(kk)+'" onclick="go(this.getAttribute(\'href\'),\''+kw+'\',event)">🚇 카카오맵 대중교통 길찾기</a>'
    +'<a class="nv" href="'+esc(nv)+'" onclick="go(this.getAttribute(\'href\'),\''+nw+'\',event)">🟢 네이버 대중교통 길찾기</a>'
    +'<div class="note">'+esc(S.name)+' 출발 → '+esc(o.ofc)+' · 모바일은 지도앱이 열리고 최단 대중교통 경로가 바로 뜹니다.</div>';
}
function card(r,id){
  const orgL=r.org?'<a class="orglink" href="'+esc(r.org)+'" target="_blank" rel="noopener">조직도 바로가기 ↗</a>':'';
  return '<div class="card"><div class="top"><span class="rg" onclick="tog(\''+id+'\')">'+esc(r.rg)+' <span class="ar">▾</span></span><span class="nm">'+esc(r.nm)+'<span class="tag">'+esc(r.th)+'</span></span></div>'
    +'<div class="sm">'+esc(r.sm)+'</div><div><span class="pd">'+esc(r.pd)+'</span><span class="src">'+esc(r.src)+'</span></div>'
    +'<div class="contact"><b>'+esc(r.dept||'담당부서 확인 필요')+'</b><br>'+orgL+'</div>'
    +'<div class="route" id="rt-'+id+'">'+orgBtns(r)+'</div></div>';
}
function festCard(f,id){
  return '<div class="card fc"><div class="top"><span class="rg" onclick="tog(\''+id+'\')">'+esc(f.rg)+' <span class="ar">▾</span></span><span class="nm">'+esc(f.nm)+' · '+esc(f.pt)+'</span></div>'
    +'<div class="fn">🎪 '+esc(f.fn)+'</div><div class="sm">'+esc(f.sm)+'</div><span class="pd">'+esc(f.pd)+'</span>'
    +'<div class="route" id="rt-'+id+'">'+orgBtns(f)+'</div></div>';
}
function tog(id){document.getElementById('rt-'+id).classList.toggle('open');}
render();
</script></body></html>
